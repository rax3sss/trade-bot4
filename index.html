<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Торговый бот | Марат Крестов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #fff;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #121927;
            border-radius: 20px;
            padding: 24px 20px 30px;
            border: 1px solid #1a2a3f;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub { font-size: 11px; color: #6a7a98; margin-top: 2px; letter-spacing: 1px; }

        .lang-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid #1a2a3f;
            border-radius: 6px;
            color: #7a8aa8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active { border-color: #00d4ff; color: #fff; background: #00d4ff; }
        .lang-btn:hover { border-color: #00d4ff; }

        .label { font-size: 13px; color: #7a8aa8; margin-bottom: 6px; display: block; font-weight: 600; }

        .pair-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .pair-selector::-webkit-scrollbar { width: 3px; }
        .pair-selector::-webkit-scrollbar-track { background: #0a0e17; }
        .pair-selector::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
        .pair-btn {
            padding: 10px 14px;
            background: #0a0e17;
            border: 1px solid #1a2a3f;
            border-radius: 10px;
            color: #7a8aa8;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            width: 100%;
        }
        .pair-btn.active { background: linear-gradient(135deg, #00d4ff, #7b2ffc); color: #fff; border-color: #00d4ff; }
        .pair-btn:hover { border-color: #00d4ff; }

        .timeframe-row {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .tf-btn {
            padding: 6px 10px;
            background: #0a0e17;
            border: 1px solid #1a2a3f;
            border-radius: 8px;
            color: #7a8aa8;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 44px;
            text-align: center;
        }
        .tf-btn.active { background: #00d4ff; color: #fff; border-color: #00d4ff; }
        .tf-btn:hover { border-color: #00d4ff; }

        .signal-card {
            background: #0a0e17;
            border-radius: 16px;
            padding: 20px 16px;
            border: 1px solid #1a2a3f;
            margin-bottom: 16px;
            text-align: center;
        }
        .signal-card .pair-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
        .signal-card .pair-name small { font-size: 12px; color: #7a8aa8; font-weight: 400; }
        .signal-card .badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 6px 0 8px;
        }
        .badge.waiting { background: rgba(255,255,255,0.05); color: #7a8aa8; border: 1px solid #1a2a3f; }
        .badge.buy { background: rgba(0, 212, 170, 0.15); color: #00d4aa; border: 1px solid rgba(0, 212, 170, 0.3); }
        .badge.sell { background: rgba(255, 71, 87, 0.15); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }
        .badge.timer {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .signal-direction { font-size: 42px; padding: 2px 0; }
        .signal-direction.buy { color: #00d4aa; }
        .signal-direction.sell { color: #ff4757; }
        .signal-direction.timer { color: #ffa500; font-size: 32px; }

        .timer-display {
            font-size: 28px;
            font-weight: 800;
            color: #ffa500;
            padding: 6px 0;
            letter-spacing: 2px;
        }

        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .signal-details .item { display: flex; flex-direction: column; align-items: center; }
        .signal-details .item .label { font-size: 9px; color: #6a7a98; text-transform: uppercase; letter-spacing: 0.5px; }
        .signal-details .item .value { font-size: 15px; font-weight: 700; margin-top: 2px; }
        .signal-details .item .value.buy { color: #00d4aa; }
        .signal-details .item .value.sell { color: #ff4757; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

        @media (max-width: 480px) {
            .container { padding: 16px 14px 20px; }
            .header h1 { font-size: 16px; }
            .signal-card .pair-name { font-size: 17px; }
            .signal-direction { font-size: 36px; }
            .timer-display { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>📊 TRADE SIGNAL</h1>
            <div class="sub">by MARAT KRESTOV</div>
        </div>

        <div class="lang-row">
            <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">РУ</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            <button class="lang-btn" data-lang="uk" onclick="setLang('uk')">UA</button>
            <button class="lang-btn" data-lang="kz" onclick="setLang('kz')">KZ</button>
        </div>

        <span class="label" id="lblInstrument">📈 Инструмент</span>
        <div class="pair-selector" id="pairSelector"></div>

        <span class="label" id="lblTimeframe">⏱️ Время</span>
        <div class="timeframe-row" id="timeframeRow">
            <button class="tf-btn" data-tf="5с">5с</button>
            <button class="tf-btn" data-tf="1м">1м</button>
            <button class="tf-btn active" data-tf="5м">5м</button>
            <button class="tf-btn" data-tf="15м">15м</button>
            <button class="tf-btn" data-tf="30м">30м</button>
            <button class="tf-btn" data-tf="1ч">1ч</button>
        </div>

        <div class="signal-card" id="signalCard">
            <div class="pair-name" id="currentPair">EUR/USD <small>Forex</small></div>
            <div class="badge" id="signalBadge">⏳ Ожидание</div>
            <div class="signal-direction" id="signalDirection">⟷</div>
            <div class="timer-display" id="timerDisplay" style="display:none;">⏱️ 00:00</div>
            <div class="signal-details">
                <div class="item">
                    <span class="label" id="lblTF">Таймфрейм</span>
                    <span class="value" id="displayTF">5м</span>
                </div>
                <div class="item">
                    <span class="label" id="lblAccuracy">Точность</span>
                    <span class="value" id="displayAccuracy">—</span>
                </div>
                <div class="item">
                    <span class="label" id="lblTime">До</span>
                    <span class="value" id="displayTime">—</span>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="getSignalBtn">💎 ПОКУПАТЬ СИГНАЛ</button>

    </div>

    <script>
        // ============================================================
        //  ЯЗЫКИ
        // ============================================================
        const LANGUAGES = {
            'ru': {
                instrument: '📈 Инструмент',
                timeframe: '⏱️ Время',
                wait: '⏳ Ожидание',
                buy: '📈 ПОКУПКА',
                sell: '📉 ПРОДАЖА',
                tf: 'Таймфрейм',
                accuracy: 'Точность',
                time: 'До',
                getSignal: '💎 ПОКУПАТЬ СИГНАЛ',
                generating: '⏳ ГЕНЕРАЦИЯ...',
                timer: '⏱️ ТАЙМЕР',
                close: 'Закрыть'
            },
            'en': {
                instrument: '📈 Instrument',
                timeframe: '⏱️ Time',
                wait: '⏳ Waiting',
                buy: '📈 BUY',
                sell: '📉 SELL',
                tf: 'Timeframe',
                accuracy: 'Accuracy',
                time: 'Until',
                getSignal: '💎 BUY SIGNAL',
                generating: '⏳ GENERATING...',
                timer: '⏱️ TIMER',
                close: 'Close'
            },
            'uk': {
                instrument: '📈 Інструмент',
                timeframe: '⏱️ Час',
                wait: '⏳ Очікування',
                buy: '📈 КУПІВЛЯ',
                sell: '📉 ПРОДАЖ',
                tf: 'Таймфрейм',
                accuracy: 'Точність',
                time: 'До',
                getSignal: '💎 КУПИТИ СИГНАЛ',
                generating: '⏳ ГЕНЕРАЦІЯ...',
                timer: '⏱️ ТАЙМЕР',
                close: 'Закрити'
            },
            'kz': {
                instrument: '📈 Құрал',
                timeframe: '⏱️ Уақыт',
                wait: '⏳ Күту',
                buy: '📈 САТЫП АЛУ',
                sell: '📉 САТУ',
                tf: 'Уақыт аралығы',
                accuracy: 'Дәлдік',
                time: 'Дейін',
                getSignal: '💎 СИГНАЛ САТЫП АЛУ',
                generating: '⏳ ЖАСАЛУДА...',
                timer: '⏱️ ТАЙМЕР',
                close: 'Жабу'
            }
        };

        let currentLang = 'ru';

        function t(key) {
            return LANGUAGES[currentLang][key] || key;
        }

        function setLang(lang) {
            if (!LANGUAGES[lang]) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            updateUI();
        }

        // ============================================================
        //  ВСЕ ВАЛЮТНЫЕ ПАРЫ
        // ============================================================
        const PAIRS = [
            'EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD',
            'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'USD/CHF', 'NZD/USD',
            'EUR/AUD', 'GBP/AUD', 'AUD/JPY', 'CAD/JPY', 'CHF/JPY',
            'EUR/CAD', 'GBP/CHF', 'AUD/CAD', 'NZD/JPY', 'USD/SEK',
            'EUR/CHF', 'GBP/NZD', 'AUD/NZD', 'CAD/CHF', 'EUR/NZD',
            'USD/NOK', 'USD/DKK', 'USD/SGD', 'USD/HKD', 'USD/MXN'
        ];

        // ============================================================
        //  СОСТОЯНИЕ
        // ============================================================
        let state = {
            pair: 'EUR/USD',
            tf: '5м',
            isWaiting: false,
            isTradeOpen: false,
            timerInterval: null,
            timerSeconds: 0
        };

        // ============================================================
        //  DOM
        // ============================================================
        const pairSelector = document.getElementById('pairSelector');
        const tfBtns = document.querySelectorAll('.tf-btn');
        const currentPair = document.getElementById('currentPair');
        const signalBadge = document.getElementById('signalBadge');
        const signalDirection = document.getElementById('signalDirection');
        const timerDisplay = document.getElementById('timerDisplay');
        const displayTF = document.getElementById('displayTF');
        const displayAccuracy = document.getElementById('displayAccuracy');
        const displayTime = document.getElementById('displayTime');
        const getSignalBtn = document.getElementById('getSignalBtn');

        // ============================================================
        //  РЕНДЕР ПАР
        // ============================================================
        function renderPairs() {
            pairSelector.innerHTML = '';
            PAIRS.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `pair-btn ${p === state.pair ? 'active' : ''}`;
                btn.textContent = p;
                btn.dataset.pair = p;
                btn.addEventListener('click', () => selectPair(p));
                pairSelector.appendChild(btn);
            });
        }

        function selectPair(pair) {
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }
            state.pair = pair;
            document.querySelectorAll('.pair-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.pair === pair);
            });
            currentPair.innerHTML = `${pair} <small>Forex</small>`;
            resetSignal();
        }

        // ============================================================
        //  ТАЙМФРЕЙМ
        // ============================================================
        tfBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (state.isTradeOpen) {
                    alert('❌ Сделка уже открыта! Дождитесь завершения.');
                    return;
                }
                tfBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.tf = btn.dataset.tf;
                displayTF.textContent = state.tf;
                resetSignal();
            });
        });

        // ============================================================
        //  СБРОС
        // ============================================================
        function resetSignal() {
            signalBadge.className = 'badge waiting';
            signalBadge.textContent = t('wait');
            signalDirection.textContent = '⟷';
            signalDirection.className = 'signal-direction';
            displayAccuracy.textContent = '—';
            displayTime.textContent = '—';
            timerDisplay.style.display = 'none';
            getSignalBtn.disabled = false;
            getSignalBtn.textContent = t('getSignal');
            state.isTradeOpen = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        // ============================================================
        //  ТАЙМЕР — ОБРАТНЫЙ ОТСЧЕТ ДО ЗАКРЫТИЯ СДЕЛКИ
        // ============================================================
        function startTimer(seconds, callback) {
            state.timerSeconds = seconds;
            timerDisplay.style.display = 'block';
            timerDisplay.textContent = `⏱️ ${formatTime(seconds)}`;

            signalBadge.className = 'badge timer';
            signalBadge.textContent = t('timer');
            signalDirection.textContent = '⏳';
            signalDirection.className = 'signal-direction timer';

            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                timerDisplay.textContent = `⏱️ ${formatTime(state.timerSeconds)}`;

                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    timerDisplay.style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        // ============================================================
        //  ГЕНЕРАЦИЯ СИГНАЛА
        // ============================================================
        function generateSignal() {
            const isBuy = Math.random() > 0.4;
            const accuracy = Math.floor(Math.random() * 25) + 70;
            const time = new Date();
            time.setMinutes(time.getMinutes() + Math.floor(Math.random() * 10) + 3);
            const timeStr = time.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            return {
                pair: state.pair,
                tf: state.tf,
                isBuy: isBuy,
                accuracy: accuracy,
                time: timeStr
            };
        }

        // ============================================================
        //  ПОКАЗАТЬ СИГНАЛ
        // ============================================================
        function showSignal(signal) {
            const isBuy = signal.isBuy;

            signalBadge.className = `badge ${isBuy ? 'buy' : 'sell'}`;
            signalBadge.textContent = isBuy ? t('buy') : t('sell');

            signalDirection.textContent = isBuy ? '↗' : '↘';
            signalDirection.className = `signal-direction ${isBuy ? 'buy' : 'sell'}`;

            displayAccuracy.textContent = signal.accuracy + '%';
            displayTime.textContent = signal.time;

            timerDisplay.style.display = 'none';
        }

        // ============================================================
        //  ОБНОВЛЕНИЕ UI
        // ============================================================
        function updateUI() {
            document.getElementById('lblInstrument').textContent = t('instrument');
            document.getElementById('lblTimeframe').textContent = t('timeframe');
            document.getElementById('lblTF').textContent = t('tf');
            document.getElementById('lblAccuracy').textContent = t('accuracy');
            document.getElementById('lblTime').textContent = t('time');
            if (!state.isTradeOpen) {
                getSignalBtn.textContent = t('getSignal');
            }
        }

        // ============================================================
        //  ПОЛУЧИТЬ СИГНАЛ — С ТАЙМЕРОМ ДО ЗАКРЫТИЯ СДЕЛКИ
        // ============================================================
        getSignalBtn.addEventListener('click', () => {
            if (state.isWaiting) return;
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }

            state.isWaiting = true;
            state.isTradeOpen = true;
            getSignalBtn.disabled = true;
            getSignalBtn.textContent = t('generating');

            // Сначала показываем сигнал
            const signal = generateSignal();
            showSignal(signal);

            // Потом запускаем таймер
            let seconds = 5;
            if (state.tf === '1м') seconds = 60;
            else if (state.tf === '5м') seconds = 300;
            else if (state.tf === '15м') seconds = 900;
            else if (state.tf === '30м') seconds = 1800;
            else if (state.tf === '1ч') seconds = 3600;

            startTimer(seconds, () => {
                state.isWaiting = false;
                state.isTradeOpen = false;
                getSignalBtn.disabled = false;
                getSignalBtn.textContent = t('getSignal');
                // Можно показать результат или просто сбросить
                resetSignal();
            });
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        renderPairs();
        currentPair.innerHTML = `${state.pair} <small>Forex</small>`;
        displayTF.textContent = state.tf;
        updateUI();
        resetSignal();

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        console.log('✅ Mini App загружена');
    </script>
</body>
</html>
