<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Торговый бот | Марат Крестов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e17;
            --card: #121927;
            --border: #1a2a3f;
            --text: #e8edf5;
            --text-secondary: #7a8aa8;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.12);
            --accent-gradient: linear-gradient(135deg, #00d4ff, #7b2ffc);
            --win: #00d4aa;
            --lose: #ff4757;
            --orange: #ffa500;
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
            overflow-x: hidden;
        }
        
        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lang-selector {
            display: flex;
            gap: 4px;
        }
        .lang-btn {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .lang-btn.active {
            border-color: var(--accent);
            color: #fff;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .lang-btn:hover { border-color: var(--accent); }
        
        /* ===== ВЫБОР ПАРЫ ===== */
        .pair-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .pair-selector::-webkit-scrollbar { width: 3px; }
        .pair-selector::-webkit-scrollbar-track { background: var(--bg); }
        .pair-selector::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .pair-btn {
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            width: 100%;
        }
        .pair-btn.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .pair-btn:hover { border-color: var(--accent); }
        
        /* ===== ВЫБОР ВРЕМЕНИ ===== */
        .timeframe-row {
            display: flex;
            gap: 6px;
            margin: 8px 0 16px 0;
            flex-wrap: wrap;
        }
        .tf-btn {
            padding: 6px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 44px;
            text-align: center;
        }
        .tf-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .tf-btn:hover { border-color: var(--accent); }
        
        /* ===== КАРТОЧКА СИГНАЛА ===== */
        .signal-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .signal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.8s;
            pointer-events: none;
        }
        .signal-card.active::before { opacity: 1; }
        .signal-card.waiting { opacity: 0.6; }
        
        .signal-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .signal-label .pair {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .signal-label .pair small {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 6px;
        }
        .signal-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .signal-badge.waiting {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .signal-badge.win {
            background: rgba(0, 212, 170, 0.15);
            color: var(--win);
            border: 1px solid rgba(0, 212, 170, 0.3);
        }
        .signal-badge.lose {
            background: rgba(255, 71, 87, 0.15);
            color: var(--lose);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .signal-badge.timer {
            background: rgba(255, 165, 0, 0.15);
            color: var(--orange);
            border: 1px solid rgba(255, 165, 0, 0.3);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .signal-direction {
            font-size: 52px;
            text-align: center;
            padding: 6px 0;
            font-weight: 300;
        }
        .signal-direction.up { color: var(--win); }
        .signal-direction.down { color: var(--lose); }
        .signal-direction.timer { color: var(--orange); font-size: 36px; }
        
        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px 12px;
            margin: 10px 0 4px 0;
        }
        .signal-details .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .signal-details .item .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .signal-details .item .value {
            font-size: 15px;
            font-weight: 700;
            margin-top: 2px;
        }
        .signal-details .item .value.down { color: var(--lose); }
        .signal-details .item .value.up { color: var(--win); }
        
        .timer-display {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--orange);
            padding: 10px 0;
            letter-spacing: 2px;
        }
        
        /* ===== КНОПКА ===== */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        /* ===== ОКНО РЕЗУЛЬТАТА ===== */
        .result-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }
        .result-overlay.show { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .result-box {
            background: var(--card);
            border-radius: 32px;
            padding: 40px 32px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            border: 1px solid var(--border);
        }
        .result-box .icon {
            font-size: 64px;
            margin-bottom: 12px;
        }
        .result-box .title {
            font-size: 28px;
            font-weight: 800;
        }
        .result-box .title.win { color: var(--win); }
        .result-box .title.lose { color: var(--lose); }
        .result-box .sub {
            color: var(--text-secondary);
            margin: 8px 0 20px 0;
            font-size: 14px;
        }
        .result-box .btn-close {
            padding: 12px 40px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        
        @media (max-width: 480px) {
            .signal-details { grid-template-columns: 1fr 1fr 1fr; }
            .signal-label .pair { font-size: 17px; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .header-right { justify-content: center; flex-wrap: wrap; }
            .tf-btn { min-width: 38px; font-size: 11px; padding: 5px 10px; }
            .pair-btn { font-size: 13px; padding: 8px 14px; }
            .timer-display { font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <div class="header">
        <h1 id="appTitle">📊 TRADE SIGNAL</h1>
        <div class="header-right">
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">РУ</button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            </div>
        </div>
    </div>

    <!-- ===== ВАЛЮТНЫЕ ПАРЫ ===== -->
    <div class="pair-selector" id="pairSelector"></div>

    <!-- ===== ТАЙМФРЕЙМЫ ===== -->
    <div class="timeframe-row" id="timeframeRow">
        <button class="tf-btn" data-tf="5с">5с</button>
        <button class="tf-btn" data-tf="1м">1м</button>
        <button class="tf-btn active" data-tf="5м">5м</button>
        <button class="tf-btn" data-tf="15м">15м</button>
        <button class="tf-btn" data-tf="30м">30м</button>
        <button class="tf-btn" data-tf="1ч">1ч</button>
    </div>

    <!-- ===== КАРТОЧКА СИГНАЛА ===== -->
    <div class="signal-card" id="signalCard">
        <div class="signal-label">
            <span class="pair" id="currentPair">EUR/USD <small>Forex</small></span>
            <span class="signal-badge waiting" id="signalBadge">⏳ Ожидание</span>
        </div>
        <div class="signal-direction" id="signalDirection">⟷</div>
        <div class="timer-display" id="timerDisplay" style="display:none;">⏱️ 00:05</div>
        <div class="signal-details">
            <div class="item">
                <span class="label" id="lblTF">Таймфрейм</span>
                <span class="value" id="displayTF">5м</span>
            </div>
            <div class="item">
                <span class="label" id="lblAccuracy">Точность</span>
                <span class="value" id="displayAccuracy">—</span>
            </div>
            <div class="item">
                <span class="label" id="lblTime">До</span>
                <span class="value" id="displayTime">—</span>
            </div>
        </div>
    </div>

    <!-- ===== КНОПКА ===== -->
    <button class="btn-primary" id="getSignalBtn">🚀 ПОЛУЧИТЬ СИГНАЛ</button>

    <!-- ===== ОКНО РЕЗУЛЬТАТА ===== -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div class="icon" id="resultIcon">🎉</div>
            <div class="title" id="resultTitle">WIN</div>
            <div class="sub" id="resultSub">EUR/USD · 5м</div>
            <button class="btn-close" id="resultCloseBtn">Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  ЯЗЫКИ
        // ============================================================
        const LANGUAGES = {
            'ru': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Ожидание',
                win: '✅ WIN',
                lose: '❌ LOSE',
                tf: 'Таймфрейм',
                accuracy: 'Точность',
                time: 'До',
                getSignal: '🚀 ПОЛУЧИТЬ СИГНАЛ',
                generating: '⏳ ГЕНЕРАЦИЯ...',
                timer: '⏱️ ТАЙМЕР',
                close: 'Закрыть',
                up: 'Вверх',
                down: 'Вниз'
            },
            'en': {
                title: '📊 TRADE SIGNAL',
                wait: '⏳ Waiting',
                win: '✅ WIN',
                lose: '❌ LOSE',
                tf: 'Timeframe',
                accuracy: 'Accuracy',
                time: 'Until',
                getSignal: '🚀 GET SIGNAL',
                generating: '⏳ GENERATING...',
                timer: '⏱️ TIMER',
                close: 'Close',
                up: 'Up',
                down: 'Down'
            }
        };

        let currentLang = 'ru';

        function t(key) { return LANGUAGES[currentLang][key] || key; }

        function setLang(lang) {
            if (!LANGUAGES[lang]) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            updateUI();
        }

        // ============================================================
        //  КОНФИГ
        // ============================================================
        const PAIRS = [
            'EUR/USD', 'GBP/USD', 'USD/JPY', 'AUD/USD', 'USD/CAD',
            'EUR/GBP', 'EUR/JPY', 'GBP/JPY', 'USD/CHF', 'NZD/USD',
            'EUR/AUD', 'GBP/AUD', 'AUD/JPY', 'CAD/JPY', 'CHF/JPY',
            'EUR/CAD', 'GBP/CHF', 'AUD/CAD', 'NZD/JPY', 'USD/SEK'
        ];

        // ============================================================
        //  СОСТОЯНИЕ
        // ============================================================
        let state = {
            pair: 'EUR/USD',
            tf: '5м',
            isWaiting: false,
            isTradeOpen: false,
            timerInterval: null,
            timerSeconds: 0
        };

        // ============================================================
        //  DOM
        // ============================================================
        const pairSelector = document.getElementById('pairSelector');
        const tfBtns = document.querySelectorAll('.tf-btn');
        const signalCard = document.getElementById('signalCard');
        const currentPair = document.getElementById('currentPair');
        const signalBadge = document.getElementById('signalBadge');
        const signalDirection = document.getElementById('signalDirection');
        const timerDisplay = document.getElementById('timerDisplay');
        const displayTF = document.getElementById('displayTF');
        const displayAccuracy = document.getElementById('displayAccuracy');
        const displayTime = document.getElementById('displayTime');
        const getSignalBtn = document.getElementById('getSignalBtn');
        const resultOverlay = document.getElementById('resultOverlay');
        const resultIcon = document.getElementById('resultIcon');
        const resultTitle = document.getElementById('resultTitle');
        const resultSub = document.getElementById('resultSub');
        const resultCloseBtn = document.getElementById('resultCloseBtn');

        // ============================================================
        //  РЕНДЕР ПАР
        // ============================================================
        function renderPairs() {
            pairSelector.innerHTML = '';
            PAIRS.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `pair-btn ${p === state.pair ? 'active' : ''}`;
                btn.textContent = p;
                btn.dataset.pair = p;
                btn.addEventListener('click', () => selectPair(p));
                pairSelector.appendChild(btn);
            });
        }

        function selectPair(pair) {
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }
            state.pair = pair;
            document.querySelectorAll('.pair-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.pair === pair);
            });
            currentPair.innerHTML = `${pair} <small>Forex</small>`;
            resetSignal();
        }

        // ============================================================
        //  ТАЙМФРЕЙМ
        // ============================================================
        tfBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (state.isTradeOpen) {
                    alert('❌ Сделка уже открыта! Дождитесь завершения.');
                    return;
                }
                tfBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.tf = btn.dataset.tf;
                displayTF.textContent = state.tf;
                resetSignal();
            });
        });

        // ============================================================
        //  СБРОС СИГНАЛА
        // ============================================================
        function resetSignal() {
            signalBadge.className = 'signal-badge waiting';
            signalBadge.textContent = t('wait');
            signalDirection.textContent = '⟷';
            signalDirection.className = 'signal-direction';
            displayAccuracy.textContent = '—';
            displayTime.textContent = '—';
            signalCard.classList.remove('active');
            signalCard.classList.remove('waiting');
            timerDisplay.style.display = 'none';
            getSignalBtn.disabled = false;
            getSignalBtn.textContent = t('getSignal');
            state.isTradeOpen = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        // ============================================================
        //  ТАЙМЕР
        // ============================================================
        function startTimer(seconds, callback) {
            state.timerSeconds = seconds;
            timerDisplay.style.display = 'block';
            timerDisplay.textContent = `⏱️ ${formatTime(seconds)}`;
            
            signalBadge.className = 'signal-badge timer';
            signalBadge.textContent = t('timer');
            signalDirection.textContent = '⏳';
            signalDirection.className = 'signal-direction timer';
            signalCard.classList.add('waiting');

            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                timerDisplay.textContent = `⏱️ ${formatTime(state.timerSeconds)}`;
                
                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    timerDisplay.style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        // ============================================================
        //  ГЕНЕРАЦИЯ СИГНАЛА (ПОКА БЕЗ API)
        // ============================================================
        function generateSignal() {
            const isWin = Math.random() > 0.4;
            const direction = Math.random() > 0.5 ? 'up' : 'down';
            const accuracy = Math.floor(Math.random() * 25) + 70;
            const time = new Date();
            time.setMinutes(time.getMinutes() + Math.floor(Math.random() * 10) + 3);
            const timeStr = time.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            return {
                pair: state.pair,
                tf: state.tf,
                win: isWin,
                direction: direction,
                accuracy: accuracy,
                time: timeStr
            };
        }

        // ============================================================
        //  ПОКАЗАТЬ СИГНАЛ
        // ============================================================
        function showSignal(signal) {
            const isWin = signal.win;
            const isUp = signal.direction === 'up';
            
            signalBadge.className = `signal-badge ${isWin ? 'win' : 'lose'}`;
            signalBadge.textContent = isWin ? t('win') : t('lose');

            signalDirection.textContent = isUp ? '↗' : '↘';
            signalDirection.className = `signal-direction ${isUp ? 'up' : 'down'}`;

            displayAccuracy.textContent = signal.accuracy + '%';
            displayTime.textContent = signal.time;

            signalCard.classList.add('active');
            signalCard.classList.remove('waiting');
            timerDisplay.style.display = 'none';

            showResult(isWin, signal);
        }

        // ============================================================
        //  РЕЗУЛЬТАТ
        // ============================================================
        function showResult(isWin, signal) {
            resultIcon.textContent = isWin ? '🎉' : '😢';
            resultTitle.textContent = isWin ? 'WIN' : 'LOSE';
            resultTitle.className = `title ${isWin ? 'win' : 'lose'}`;
            resultSub.textContent = `${signal.pair} · ${signal.tf}`;
            resultOverlay.classList.add('show');
        }

        resultCloseBtn.addEventListener('click', () => {
            resultOverlay.classList.remove('show');
        });

        resultOverlay.addEventListener('click', (e) => {
            if (e.target === resultOverlay) {
                resultOverlay.classList.remove('show');
            }
        });

        // ============================================================
        //  ОБНОВЛЕНИЕ UI
        // ============================================================
        function updateUI() {
            document.getElementById('appTitle').textContent = t('title');
            if (!state.isTradeOpen) {
                getSignalBtn.textContent = t('getSignal');
            }
            document.getElementById('lblTF').textContent = t('tf');
            document.getElementById('lblAccuracy').textContent = t('accuracy');
            document.getElementById('lblTime').textContent = t('time');
            resultCloseBtn.textContent = t('close');
        }

        // ============================================================
        //  ПОЛУЧИТЬ СИГНАЛ
        // ============================================================
        getSignalBtn.addEventListener('click', () => {
            if (state.isWaiting) return;
            if (state.isTradeOpen) {
                alert('❌ Сделка уже открыта! Дождитесь завершения.');
                return;
            }

            state.isWaiting = true;
            state.isTradeOpen = true;
            getSignalBtn.disabled = true;
            getSignalBtn.textContent = t('generating');

            signalCard.style.transition = 'all 0.3s';
            signalCard.style.transform = 'scale(0.97)';
            signalCard.style.opacity = '0.6';

            let seconds = 5; // 5 секунд по умолчанию
            if (state.tf === '1м') seconds = 60;
            else if (state.tf === '5м') seconds = 300;
            else if (state.tf === '15м') seconds = 900;
            else if (state.tf === '30м') seconds = 1800;
            else if (state.tf === '1ч') seconds = 3600;

            startTimer(seconds, () => {
                const signal = generateSignal();
                state.isWaiting = false;
                state.isTradeOpen = false;
                getSignalBtn.disabled = false;
                getSignalBtn.textContent = t('getSignal');
                signalCard.style.transform = 'scale(1)';
                signalCard.style.opacity = '1';
                showSignal(signal);
            });
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        renderPairs();
        currentPair.innerHTML = `${state.pair} <small>Forex</small>`;
        displayTF.textContent = state.tf;
        updateUI();
        resetSignal();

        // ============================================================
        //  ТЕЛЕГРАМ
        // ============================================================
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        console.log('✅ Mini App загружена');
    </script>
</body>
</html>
